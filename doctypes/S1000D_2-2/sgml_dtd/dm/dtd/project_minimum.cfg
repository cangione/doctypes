<!--**********************************************************************
    *                                                                    *
    *                        S1000D Issue 2                              *
    *                SGML Document Type Definition                       *
    *                                                                    *
    *                     Release Version 2.2                            *
    *                       Date: 2005-05-01                             *
    *                                                                    *
    *                                                                    *
    *       This version redeclares attribute value sets to have         *
    *            predefined "numeric" values for Issue 2!                *
    *                                                                    *
    *                                                                    *
    * Amendment:-                                                        *
    * 1. CPF 2004-30DE: Introduce public identifier date.                *
    * 2. CPF 2004-24GB: Introduce entity %MNTLVLS; for the definition of *
    *                   generic maintenance levels.                      *
    *                                                                    *
    *                                                                    *
    * NOTE:-                                                             *
    * ======                                                             *
    * The project configuration component should be configured as        *
    * project specific.                                                  *
    * The component is invoked by S1000D.CFG!!                           *
    *                                                                    *
    *                                                                    *
    * This is the minimum S1000D Project Configuration with "numeric"    *
    * values. Re-declarations are based on the full set of allowable     *
    * "numeric" attribute values as given in Chap 3.9.6.                 *
    *                                                                    *
    *                                                                    *
    * Typical invocation:-                                               *
    * <!ENTITY % PROJECT                                                 *
    *   PUBLIC "-//S1000D//ENTITIES S1000D Project Configuration 20050501*
    *            //EN" >                                                 *
    * %PROJECT;                                                          *
    ********************************************************************** -->
    
    
    
<!--**********************************************************************
    * Define parameter entities for declared values for project          *
    *  configurable attribute values.                                    *
    *  See specification text for definition of allowable sets of values.*
    *@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@*
    * Declared param ents:-                                              *
    *                                                                    *
    *  %ACROTYPS; - Declared - Type of acronym or abbreviation           *
    *  %CAVEATS;  - Declared - Type of caveat                            *
    *  %CLASSES;  - Declared - Security classification                   *
    *  %COLOURS;  - Declared - Color of the caption                      *
    *  %COMMCLSS; - Declared - Commercial security classification        *
    *  %CPRIOS;   - Declared - Priority level of a comment               *
    *  %CREWMEMS; - Declared - Crew member required for drill or step    *
    *  %DRILLTPS; - Declared - Type of aircrew drill (Flight deck pres.) *
    *  %EMPHS;    - Declared - Type of emphasis                          *
    *  %MNTLVLS;  - Declared - Maintenance level                         *
    *  %PREFIXES; - Declared - Prefix of random list items               *
    *  %RSPTYPES; - Declared - Type of response to a comment             *
    *  %SKILLS;   - Declared - Personnel skill level                     *
    *  %SUP.LEVS; - Declared - Supervisor level                          *
    *  %TYPES;    - Declared - Limit type                                *
    *  %THIUOMS;  - Declared - Unit of measurement for theshold interval *
    ********************************************************************** -->


<!--**********************************************************************
    * Define Entity %ACROTYPS; (Type of acronym or abbreviation)         *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  at01   	     -   acronym (candidate for list of abbreviations)   *
    *  at02   	     -   term    (candidate for list of terms)           *
    *  at03          -   symbol  (candidate for list of symbols)         *
    *  at04          -   spec    (candidate for list of applicable specs)*
    *                                                                    *
    *  Default value:    "at01"                                          *
    ********************************************************************** -->
<!ENTITY % ACROTYPS " (at01|at02|at03|at04) 'at01' " >
		       
		       
<!--**********************************************************************
    * Define Entity %CAVEATS; (Type of (national) caveat)                *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  cv01...cv09   -   NOT GIVEN (Reserved for S1000D)                 *
    *                                                                    *
    *  No default value.                                                 *
    ********************************************************************** -->
<!ENTITY % CAVEATS  " (cv01|cv02|cv03|cv04|cv05|cv06|cv07|cv08|cv09) " >

		       
<!--**********************************************************************
    * Define Entity %CLASSES; (Security classification)                  *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  01   	     -   1 (lowest level of security classification,     *
    *                       eg Unclassified)                             *
    *  02   	     -   2 (next higher level of security classification,*
    *                       eg Restricted)                               *
    *  03            -   3 (next higher level of security classification,*
    *                       eg Confidential)                             *
    *  04            -   4 (next higher level of security classification,*
    *                       eg Secret)                                   *
    *  05            -   5 (next higher level of security classification,*
    *                       eg Top secret)                               *
    *  06            -   6 (another level of security classification)    *
    *  07            -   7 (another level of security classification)    *
    *  08            -   8 (another level of security classification)    *
    *  09            -   9 (another level of security classification)    *
    *                                                                    *
    *  No default value.                                                 *
    ********************************************************************** -->
<!ENTITY % CLASSES  " (01|02|03|04|05|06|07|08|09) " >

		       
<!--**********************************************************************
    * Define Entity %COLOURS; (Color of the caption)                     *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  co00   	     -   none                                            *
    *  co01   	     -   green                                           *
    *  co02   	     -   amber                                           *
    *  co03          -   yellow                                          *
    *  co04          -   red                                             *
    *  co05          -   NOT GIVEN (Reserved for S1000D)                 *
    *  co06          -   NOT GIVEN (Reserved for S1000D)                 *
    *  co07   	     -   white                                           *
    *  co08          -   grey                                            *
    *  co09          -   clear                                           *
    *                                                                    *
    *  Default value:    "co09"                                          *
    ********************************************************************** -->
<!ENTITY % COLOURS  " (co00|co01|co02|co03|co04|co05|co06|co07|co08|co09) 'co09' " >

		       
<!--**********************************************************************
    * Define Entity %COMMCLSS; (Commercial security classification)      *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  cc01...cc09   -   NOT GIVEN (Reserved for S1000D)                 *
    *                                                                    *
    *  No default value.                                                 *
    ********************************************************************** -->
<!ENTITY % COMMCLSS " (cc01|cc02|cc03|cc04|cc05|cc06|cc07|cc08|cc09) " >

		       
<!--**********************************************************************
    * Define Entity %CPRIOS; (Priority level of a comment)               *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  cp01   	     -   Routine                                         *
    *  cp02   	     -   Emergency                                       *
    *  cp03          -   Safety critical                                 *
    *                                                                    *
    *  Default value:    "cp01"                                          *
    ********************************************************************** -->
<!ENTITY % CPRIOS   " (cp01|cp02|cp03) 'cp01' " >

		       
<!--**********************************************************************
    * Define Entity %CREWMEMS; (Crew member required for drill or step)  *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  cm01   	     -   all                                             *
    *  cm02   	     -   pilot                                           *
    *  cm03          -   co-pilot                                        *
    *  cm04          -   navigator                                       *
    *  cm05          -   engineer                                        *
    *  cm06          -   ground crew                                     *
    *  cm07   	     -   load master                                     *
    *  cm08          -   cabin supervisor                                *
    *                                                                    *
    *  No default value.                                                 *
    ********************************************************************** -->
<!ENTITY % CREWMEMS " (cm01|cm02|cm03|cm04|cm05|cm06|cm07|cm08) " >

		       
<!--**********************************************************************
    * Define Entity %DRILLTPS; (Type of aircrew drill (Flight deck pres.)*
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  dt00   	     -   none                                            *
    *  dt01   	     -   green                                           *
    *  dt02   	     -   amber                                           *
    *  dt03          -   yellow                                          *
    *  dt04          -   red                                             *
    *  dt05          -   orange                                          *
    *  dt06          -   blue                                            *
    *                                                                    *
    *  Default value:    "dt00"                                          *
    ********************************************************************** -->
<!ENTITY % DRILLTPS " (dt00|dt01|dt02|dt03|dt04|dt05|dt06) 'dt00' " >

		       
<!--**********************************************************************
    * Define Entity %EMPHS; (Type of emphasis)                           *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  em01   	     -   bold                                            *
    *  em02   	     -   italic (only for legacy data, see Chap 3.9.1)   *
    *  em03          -   underline (only for legacy data, see Chap 3.9.1)*
    *  em04          -   overline (only for marking vectors)             *
    *  em05          -   strikethrough (not to be used to mark deleted   *
    *                                   text)                            *
    *                                                                    *
    *  Default value:    "em01"                                          *
    ********************************************************************** -->
<!ENTITY % EMPHS    " (em01|em02|em03|em04|em05) 'em01' " >

		       
<!--**********************************************************************
    * Define Entity %MNTLVLS; (Maintenance level)                        *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  ml01   	     -   Maintenance level 1                             *
    *  ml02   	     -   Maintenance level 2                             *
    *  ml03   	     -   Maintenance level 3                             *
    *  ml04   	     -   Maintenance level 4                             *
    *  ml05   	     -   Maintenance level 5                             *
    *                                                                    *
    *  No default value.                                                 *
    ********************************************************************** -->
<!ENTITY % MNTLVLS " (ml01|ml02|ml03|ml04|ml05) " >
<!-- Newly introduced entity -->


<!--**********************************************************************
    * Define Entity %PREFIXES; (Prefix of random list items)             *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  pf01   	     -   simple (no prefix, only indent)                 *
    *  pf02   	     -   unorder (depending on list level, prefix with   *
    *                             short dash for first level, bullet for *
    *                             second, and short dash for third level *
    *                             - ISOpub: bull, dash)                  *
    *  pf03          -   dash (short - ISOpub: dash)                     *
    *  pf04          -   disc (filled circle in circle - ISOamsb: ofcir) *
    *  pf05          -   circle (outline - ISOpub: cir)                  *
    *  pf06          -   square (outline - ISOtech: square)              *
    *                                                                    *
    *  Default value:    "pf02"                                          *
    ********************************************************************** -->
<!ENTITY % PREFIXES " (pf01|pf02|pf03|pf04|pf05|pf06) 'pf02' " >

		       
<!--**********************************************************************
    * Define Entity %RSPTYPES; (Type of response to a comment)           *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  rt01   	     -   Accepted                                        *
    *  rt02   	     -   Pending                                         *
    *  rt03   	     -   Partly accepted                                 *
    *  rt04          -   Rejected                                        *
    *                                                                    *
    *  No default value.                                                 *
    ********************************************************************** -->
<!ENTITY % RSPTYPES " (rt01|rt02|rt03|rt04) " >

		       
<!--**********************************************************************
    * Define Entity %SKILLS; (Personnel skill level)                     *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  sk01   	     -   basic                                           *
    *  sk02   	     -   intermediate                                    *
    *  sk03          -   advanced                                        *
    *                                                                    *
    *  No default value.                                                 *
    ********************************************************************** -->
<!ENTITY % SKILLS   " (sk01|sk02|sk03) " >

		       
<!--**********************************************************************
    * Define Entity %SUP.LEVS; (Supervisor level)                        *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  sl01   	     -   Low                                             *
    *  sl02   	     -   Low intermediate                                *
    *  sl03          -   High intermediate                               *
    *  sl04          -   High                                            *
    *                                                                    *
    *  No default value.                                                 *
    ********************************************************************** -->
<!ENTITY % SUP.LEVS " (sl01|sl02|sl03|sl04) " >

		       
<!--**********************************************************************
    * Define Entity %TYPES; (Limit type)                                 *
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  lt01   	     -   Time between overhaul (tbo)                     *
    *  lt02   	     -   Hard time (ht)                                  *
    *  lt03          -   Since last maintenance (slm)                    *
    *  lt04          -   Out time limit (otl)                            *
    *  lt05          -   On condition (oc)                               *
    *  lt06          -   Check maintenance (cm)                          *
    *  lt07   	     -   Functional check (fc)                           *
    *                                                                    *
    *  No default value.                                                 *
    ********************************************************************** -->
<!ENTITY % TYPES    " (lt01|lt02|lt03|lt04|lt05|lt06|lt07) " >

		       
<!--**********************************************************************
    * Define Entity %THIUOMS; (Unit of measurement for theshold interval)*
    * containing the following allowable attribute values and their      *
    * meanings in S1000D:-                                               *
    *                                                                    *
    *  th01   	     -   flight hours                                    *
    *  th02   	     -   flight cycles                                   *
    *  th03          -   months                                          *
    *  th04          -   weeks                                           *
    *  th05          -   years                                           *
    *  th06          -   days                                            *
    *  th07   	     -   supersonic cycles                               *
    *  th08          -   pressure cycles                                 *
    *  th09          -   engine cycles                                   *
    *  th10          -   engine change                                   *
    *  th11          -   shop visits                                     *
    *  th12          -   auxiliary power unit change                     *
    *  th13          -   landing gear change                             *
    *  th14          -   wheel change                                    *
    *  th15          -   engine start                                    *
    *                                                                    *
    *  No default value.                                                 *
    ********************************************************************** -->
<!ENTITY % THIUOMS  " (th01|th02|th03|th04|th05|th06|th07|th08|th09|th10|
		       th11|th12|th13|th14|th15) " >
