<!--**********************************************************************
    *                                                                    *
    *                        S1000D Issue 2                              *
    *                SGML Document Type Definition                       *
    *                                                                    *
    *                     Release Version 2.2                            *
    *                       Date: 2005-05-01                             *
    *                                                                    *
    * Amendment:-                                                        *
    * 1. New public identifier.                                          *
    * 2. CPF 2002-11FR: Redefinition of entities %ACTEXT; and %FFT; for  *
    *                   descriptive data modules.                        *
    *                                                                    *
    * Typical invocation:-                                               *
    * <!ENTITY % DESCRPTCFG PUBLIC                                       *
    *   "-//S1000D//ENTITIES Description Configuration 20050501//EN" >   *
    * %DESCRPTCFG;                                                       *
    ********************************************************************** -->



<!--**********************************************************************
    * Define Entity %ACTEXT; (All Crew Running Text Continuation)        *
    * containing:                                                        *
    * or                                                                 *
    *  caption  - Mandatory Single     contains capline.                 *
    ********************************************************************** -->

<!ENTITY % ACTEXT "| caption" >


<!--**********************************************************************
    * Define Entity %FFT; (Figure or Foldout or Table or Caption)        *
    * containing:-                                                       *
    *  figure   - Mandatory  Single     contains Definition stored in    *
    *                                   entity %titles;, applic, graphic,*
    *                                   sheet, rfa, legend.              *
    * or                                                                 *
    *  foldout  - Mandatory  Single     contains figure, table.          *
    * or                                                                 *
    *  table    - Mandatory  Single     contains Definition stored in    *
    *                                   entity %titles;, tgroup, graphic.*
    *  Definition stored in entity %ACTEXT;.                             *
    ********************************************************************** -->

<!ENTITY % FFT "(figure | foldout | table %ACTEXT;)" >
